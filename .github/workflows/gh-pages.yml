name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare files for deployment
        run: |
          mkdir -p dist
          echo "Copying essential files..."
          cp index.html dist/ || echo "Warning: index.html not found"
          cp styles.css dist/ || echo "Warning: styles.css not found"
          cp script.js dist/ || echo "Warning: script.js not found"
          cp config.js dist/ || echo "Warning: config.js not found"
          
          echo "Copying optional files..."
          cp favicon.ico dist/ 2>/dev/null || echo "favicon.ico not found (optional)"
          cp *.png dist/ 2>/dev/null || echo "No .png files found"
          cp *.jpeg dist/ 2>/dev/null || echo "No .jpeg files found"
          cp *.jpg dist/ 2>/dev/null || echo "No .jpg files found"
          
          echo "Deployment ready. Files in dist:"
          ls -lah dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          keep_files: true
