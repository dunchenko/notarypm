name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files for deployment
        run: |
          mkdir -p dist
          echo "Copying essential files..."
          cp index.html dist/ 2>/dev/null || echo "index.html not found"
          cp styles.css dist/ 2>/dev/null || echo "styles.css not found"
          cp script.js dist/ 2>/dev/null || echo "script.js not found"
          cp config.js dist/ 2>/dev/null || echo "config.js not found"
          cp favicon.ico dist/ 2>/dev/null || true
          cp *.png dist/ 2>/dev/null || true
          cp *.jpeg dist/ 2>/dev/null || true
          cp *.jpg dist/ 2>/dev/null || true
          
          echo "Files ready for deployment:"
          ls -lah dist/

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
